services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: navx
      POSTGRES_PASSWORD: navx
      POSTGRES_DB: navx
    ports:
      - "5432:5432"
    volumes:
      - navx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navx -d navx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - navx-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  navx-postgres-data:
  navx-redis-data:
